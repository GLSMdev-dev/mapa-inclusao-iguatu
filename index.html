<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mapa da Inclusão - Iguatu/CE</title>

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />

    <!-- Estilos Personalizados -->
    <link rel="stylesheet" href="css/style.css?v=20260703" />
  </head>
  <body>
    <!-- Navbar -->
    <nav class="navbar">
      <div class="nav-container">
        <div class="nav-brand">
          <div class="brand-mark">
            <img src="logo.png" alt="PertenSer" onerror="this.style.display='none'" />
          </div>
          <div>
            <span>Projeto PertenSer</span>
            <small>Iguatu/CE</small>
          </div>
        </div>
        <button class="nav-toggle" id="navToggle">
          <i class="fas fa-bars"></i>
        </button>
        <ul class="nav-menu" id="navMenu">
          <li>
            <a href="index.html" class="active"
              ><i class="fas fa-map"></i> Mapa</a
            >
          </li>
          <li>
            <button type="button" class="nav-link-btn" id="openRegisterModal">
              <i class="fas fa-plus-circle"></i> Cadastrar
            </button>
          </li>
          <li>
            <a href="configuracao.html"
              ><i class="fas fa-cog"></i> Configurações</a
            >
          </li>
        </ul>
      </div>
    </nav>

    <!-- Container Principal -->
    <div class="main-container">
      <!-- Sidebar de Filtros -->
      <aside class="sidebar" id="sidebar">
        <div class="filters-container">
          <div class="sidebar-actions">
            <button type="button" class="btn btn-primary" id="pickLocationHint">
              <i class="fas fa-map-marker-alt"></i> Marcar nova ação
            </button>
            <button type="button" class="btn btn-secondary hidden" id="cancelAddMode">
              <i class="fas fa-times"></i> Cancelar
            </button>
          </div>
          <h3><i class="fas fa-filter"></i> Filtros</h3>

          <!-- Busca -->
          <div class="search-box">
            <input
              type="text"
              id="searchInput"
              placeholder="Buscar localização..."
            />
            <button id="searchBtn"><i class="fas fa-search"></i></button>
          </div>

          <!-- Filtro por Categoria -->
          <div class="filter-group">
            <label><i class="fas fa-tags"></i> Categoria</label>
            <select id="categoryFilter">
              <option value="all">Todas as categorias</option>
              <option value="educacao">🎓 Educação</option>
              <option value="saude">🏥 Saúde</option>
              <option value="cultura">🎭 Cultura</option>
              <option value="esporte">⚽ Esporte</option>
              <option value="assistencia">🤝 Assistência Social</option>
            </select>
          </div>

          <!-- Estatísticas -->
          <div class="stats-container" id="statsContainer">
            <h4><i class="fas fa-chart-bar"></i> Estatísticas</h4>
            <div id="statsContent">
              <div class="stat-item">
                <span class="stat-label">Total:</span>
                <span class="stat-value" id="totalCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Educação:</span>
                <span class="stat-value" id="educacaoCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Saúde:</span>
                <span class="stat-value" id="saudeCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Cultura:</span>
                <span class="stat-value" id="culturaCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Esporte:</span>
                <span class="stat-value" id="esporteCount">0</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Assistência:</span>
                <span class="stat-value" id="assistenciaCount">0</span>
              </div>
            </div>
          </div>
        </div>
      </aside>

      <!-- Conteúdo Principal -->
      <main class="content">
        <!-- Mapa -->
        <div id="map" class="map-container"></div>

        <!-- Lista de Localizações -->
        <div class="locations-list" id="locationsList">
          <div class="list-header">
            <h3><i class="fas fa-list"></i> Localizações</h3>
            <span id="listCount">0 encontrados</span>
          </div>
          <div id="locationsContainer" class="locations-grid">
            <!-- Cards serão gerados dinamicamente -->
          </div>
        </div>
      </main>
    </div>

    <div class="modal-backdrop" id="registerModal">
      <div class="modal-card">
        <div class="modal-header">
          <h3><i class="fas fa-plus-circle"></i> Nova ação inclusiva</h3>
          <button type="button" class="modal-close" id="closeRegisterModal">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <form id="locationFormModal" class="modal-form">
          <div class="form-grid">
            <div class="form-group">
              <label for="actionName">Nome da ação <span class="required">*</span></label>
              <input id="actionName" name="actionName" required />
            </div>
            <div class="form-group">
              <label for="actionCategory">Tipo de serviço <span class="required">*</span></label>
              <select id="actionCategory" name="actionCategory" required></select>
            </div>
          </div>
          <div class="form-group">
            <label for="actionDescription">Descrição</label>
            <textarea id="actionDescription" name="actionDescription" rows="3"></textarea>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="publicTarget">Público-alvo</label>
              <input id="publicTarget" name="publicTarget" />
            </div>
            <div class="form-group">
              <label for="professionals">Profissionais</label>
              <input id="professionals" name="professionals" />
            </div>
          </div>
          <div class="form-grid">
            <div class="form-group">
              <label for="address">Endereço</label>
              <input id="address" name="address" />
            </div>
            <div class="form-group">
              <label for="pinColor">Cor do pin</label>
              <div class="color-picker">
                <input id="pinColor" name="pinColor" type="hidden" value="#e74c3c" />
                <button type="button" class="color-swatch active" data-color="#e74c3c" style="background:#e74c3c"></button>
                <button type="button" class="color-swatch" data-color="#3498db" style="background:#3498db"></button>
                <button type="button" class="color-swatch" data-color="#2ecc71" style="background:#2ecc71"></button>
                <button type="button" class="color-swatch" data-color="#9b59b6" style="background:#9b59b6"></button>
                <button type="button" class="color-swatch" data-color="#f39c12" style="background:#f39c12"></button>
                <button type="button" class="color-swatch" data-color="#16a085" style="background:#16a085"></button>
              </div>
            </div>
          </div>
          <div class="form-group">
            <input id="latitude" name="latitude" type="hidden" />
            <input id="longitude" name="longitude" type="hidden" />
          </div>
          <div class="form-group">
            <label>Fotos da ação</label>
            <div class="drop-zone" id="dropZoneModal">
              <i class="fas fa-cloud-upload-alt"></i>
              <p>Arraste imagens aqui ou clique para selecionar</p>
              <input id="photoInput" type="file" accept="image/*" multiple />
            </div>
            <div id="imagePreviewModal" class="image-preview"></div>
          </div>
          <div class="form-actions modal-actions">
            <button type="button" class="btn btn-secondary" id="cancelRegisterModal">Cancelar</button>
            <button type="submit" class="btn btn-primary" id="submitActionBtn">
              <i class="fas fa-save"></i> Salvar ação
            </button>
          </div>
        </form>
      </div>
    </div>

    <div class="modal-backdrop" id="detailsModal">
      <div class="modal-card details-modal-card">
        <div class="modal-header">
          <h3 id="detailsModalTitle">Detalhes da ação</h3>
          <button type="button" class="modal-close" id="closeDetailsModal">
            <i class="fas fa-times"></i>
          </button>
        </div>
        <div id="detailsModalContent" class="details-modal-content"></div>
        <div id="detailsModalImages" class="details-modal-images"></div>
      </div>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>

    <script src="js/config.js?v=20260703"></script>
    <script src="js/logger.js?v=20260703"></script>
    <script src="js/utils.js?v=20260703"></script>
    <script src="js/api.js?v=20260703"></script>
    <script src="js/mapa.js?v=20260703"></script>
    <script src="js/app.js?v=20260703"></script>
  </body>
</html>
